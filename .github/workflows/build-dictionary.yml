name: dictionary build

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dictionary:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: build dictionary
        run: python -m meikikai.scripts.build_dictionary

      - name: compress dictionary
        run: |
          mv "$HOME/Library/Application Support/meikikai/dictionary.pkl" .
          zip meikikai-dictionary.zip dictionary.pkl

      - name: update latest dictionary release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete meikikai-dictionary-latest --yes --cleanup-tag || true
          gh release create meikikai-dictionary-latest \
            --title "MeikiKai dictionary latest" \
            --notes "Latest MeikiKai default dictionary." \
            --prerelease \
            meikikai-dictionary.zip
