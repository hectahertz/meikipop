name: Release

on:
  push:
    tags:
      - 'meikikai-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish'
        required: true

jobs:
  build-macos:
    uses: ./.github/workflows/build-macos.yml

  release:
    needs: [build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: MeikiKai ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-rc') }}
          files: artifacts/*/*.dmg
