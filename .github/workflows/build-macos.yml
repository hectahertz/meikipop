name: macos build

on:
  workflow_call:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: clean previous builds
        run: rm -rf build dist || true

      - name: build app
        run: pyinstaller meikikai.macos.spec

      - name: create dmg
        run: |
          rm -rf dist/dmg-root
          mkdir -p dist/dmg-root
          cp -R dist/MeikiKai.app dist/dmg-root/
          ln -s /Applications dist/dmg-root/Applications
          hdiutil create \
            -volname "MeikiKai" \
            -srcfolder dist/dmg-root \
            -ov \
            -format UDZO \
            dist/meikikai.macos.arm64.dmg

      - name: upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: meikikai-macos-arm64
          path: dist/meikikai.macos.arm64.dmg
